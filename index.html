<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Pi Auto Market 2026</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #f8f9fa; text-align: center; }
        header { background-color: #5b2c91; color: white; padding: 20px; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; padding: 20px; }
        .car { background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .car img { width: 100%; height: 180px; object-fit: cover; border-radius: 10px; }
        .btn-pay { background-color: #5b2c91; color: white; border: none; padding: 10px; width: 100%; border-radius: 8px; margin-top: 10px; }
        .legal { background: #fff; padding: 20px; margin: 20px; border-radius: 10px; border-top: 5px solid #ffa000; }
    </style>
</head>
<body>

<header>
    <h1>منصة Pi Auto Market 2026</h1>
    <p>إشراف: أبو جود المشولي</p>
</header>

<div class="gallery">
    <!-- سيارة 1 -->
    <div class="car">
        <img src="lexus-lx.png" alt="Lexus">
        <h3>Lexus LX 2026</h3>
        <button class="btn-pay" onclick="createPiPayment('Lexus LX 2026')">ادفع 1 Pi للاستفسار</button>
    </div>
    <!-- سيارة 2 -->
    <div class="car">
        <img src="hyundai-elantra.png" alt="Hyundai">
        <h3>Hyundai Elantra</h3>
        <button class="btn-pay" onclick="createPiPayment('Hyundai Elantra')">ادفع 1 Pi للاستفسار</button>
    </div>
    <!-- سيارة 3 -->
    <div class="car">
        <img src="toyota-camry.png" alt="Toyota">
        <h3>Toyota Camry</h3>
        <button class="btn-pay" onclick="createPiPayment('Toyota Camry')">ادفع 1 Pi للاستفسار</button>
    </div>
</div>

<div class="legal">
    <h3>🔒 سياسة الخصوصية</h3>
    <p>هدفنا الوساطة التقنية الآمنة فقط عبر شبكة Pi.</p>
    <h4>⚖️ إخلاء مسؤولية قانوني</h4>
    <p>منصة تجريبية، لا نطلب كلمة السر لمحفظتك أبداً.</p>
</div>

<script>
    Pi.init({ version: "2.0", sandbox: true });
    function createPiPayment(carName) {
        Pi.createPayment({ amount: 1, memo: "استفسار: " + carName }, { onSuccess: function() { alert("تم الدفع!"); } });
    }
</script>
</body>
</html>
