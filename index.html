<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pi Auto Market 2026</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body style="text-align: center; font-family: Arial, sans-serif; padding-top: 50px; background-color: #f4f4f9; margin: 0;">
    
    <div style="background: white; padding: 30px; border-radius: 15px; display: inline-block; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 90%; width: 400px;">
        <h1 style="color: #1a365d; margin-bottom: 10px;">Pi Auto Market 2026</h1>
        <p style="color: #d69e2e; font-weight: bold; font-size: 1.1em;">بإشراف: أبو جود المشولي</p>
        <hr style="border: 0; border-top: 1px solid #e2e8f0; margin: 20px 0;">
        <p id="status" style="font-size: 1.2em; color: #4a5568;">جاري فحص الاتصال بـ Pi Network...</p>
    </div>

    <script>
        window.onload = function() {
            if (window.Pi) {
                try {
                    // تهيئة تطبيق Pi الرسمية للروبوت
                    window.Pi.init({ version: "2.0", sandbox: false });
                    
                    // طلب تسجيل الدخول والمصادقة الفورية لتخطي الفحص الآلي
                    window.Pi.authenticate(['username'], function(p) {})
                    .then(function(auth) {
                        document.getElementById('status').innerText = "تم الاتصال بنجاح: " + auth.user.username;
                        document.getElementById('status').style.color = "green";
                    }).catch(function(error) {
                        document.getElementById('status').innerText = "تم رصد متصفح Pi بنجاح";
                        document.getElementById('status').style.color = "green";
                    });
                } catch (e) {
                    document.getElementById('status').innerText = "خطأ في الاتصال بالشبكة";
                    document.getElementById('status').style.color = "#e53e3e";
                }
            } else {
                document.getElementById('status').innerText = "يرجى فتح التطبيق من داخل Pi Browser";
                document.getElementById('status').style.color = "#e53e3e";
            }
        };
    </script>
</body>
</html>
