<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pi Auto Market 2026 | أبو جود المشولي</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #f4f4f9; padding: 50px; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 500px; margin: auto; border-top: 5px solid #5e2d91; }
        h1 { color: #5e2d91; margin-bottom: 10px; }
        p { color: #333; font-size: 18px; line-height: 1.6; }
        .btn { background-color: #5e2d91; color: white; padding: 15px 25px; border: none; border-radius: 8px; cursor: pointer; font-size: 18px; text-decoration: none; display: inline-block; margin-top: 20px; transition: 0.3s; }
        .btn:hover { background-color: #4a2373; }
        .footer { margin-top: 30px; font-size: 14px; color: #777; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Pi Auto Market 2026</h1>
        <p>أول منصة وسيطة لتجارة السيارات في اليمن باستخدام عملة Pi</p>
        <p><b>بإشراف: أبو جود المشولي</b></p>
        <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">
        <p id="status">جاري الاتصال بشبكة Pi...</p>
        <button class="btn" onclick="login()">تسجيل الدخول عبر Pi Browser</button>
        <div class="footer">حقوق النشر © 2026 - جميع الحقوق محفوظة</div>
    </div>

    <script>
        const Pi = window.Pi;
        Pi.init({ version: "2.0", sandbox: false });

        async function login() {
            try {
                const scopes = ['username', 'payments'];
                const auth = await Pi.authenticate(['username'], function(p){});
                document.getElementById('status').innerText = "تم تسجيل الدخول بنجاح: " + auth.user.username;
                document.getElementById('status').style.color = "green";
            } catch (err) {
                document.getElementById('status').innerText = "يرجى فتح التطبيق من داخل Pi Browser لضمان التوثيق";
                document.getElementById('status').style.color = "red";
            }
        }

        function onIncompletePaymentFound(payment) {
            console.log("Payment found", payment);
        };
    </script>
</body>
</html>
