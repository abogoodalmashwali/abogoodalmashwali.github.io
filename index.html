<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Pi Auto Market 2026</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { font-family: Arial; text-align: center; padding: 20px; }
        .car { border: 1px solid #ccc; padding: 10px; margin: 10px; border-radius: 8px; }
        .pi-pay-btn { background-color: #5b2c91; color: white; padding: 10px; border-radius: 5px; cursor: pointer; border: none; }
    </style>
</head>
<body>

    <h1>منصة Pi للسيارات</h1>

    <div class="car">
        <h3>Lexus LX 2026</h3>
        <button class="pi-pay-btn" onclick="createPayment()">ادفع 1 Pi للاستفسار</button>
    </div>

    <script>
        // هنا يتم ربط تطبيقك بشبكة Pi
        Pi.init({ version: "2.0", sandbox: true, apiKey: q3lbzzghlpy8hddplkwbhicmtzypjl6pqgigvdrdlczpy1b1mmecbsni8s9tnrru" });

        // هذه هي دالة الدفع التي تفتح واجهة Pi الرسمية
        function createPayment() {
            Pi.createPayment({
                amount: 1,
                memo: "استفسار عن سيارة",
                metadata: { car: "Lexus LX 2026" },
            }, {
                onReadyForServerApproval: (paymentId) => {
                    alert("تم إنشاء طلب الدفع بنجاح: " + paymentId);
                },
                onReadyForServerCompletion: (paymentId, txid) => {
                    alert("تمت العملية بنجاح! رقم المعاملة: " + txid);
                },
                onCancel: (paymentId) => {
                    alert("تم إلغاء العملية");
                },
                onError: (error, paymentId) => {
                    alert("حدث خطأ: " + error);
                },
            });
        }
    </script>
</body>
</html>
