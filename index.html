<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Pi Auto Market 2026</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .card { background: white; border-radius: 15px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .car-img { width: 100%; height: 250px; background-size: cover; background-position: center; border-radius: 10px; margin-bottom: 10px; }
        .pi-btn { background: #5b2c91; color: white; padding: 15px; border-radius: 10px; text-align: center; display: block; font-weight: bold; text-decoration: none; }
        .sandbox-note { background: #fff3cd; color: #856404; padding: 10px; border-radius: 5px; font-size: 0.9em; margin-top: 10px; text-align: center; }
    </style>
</head>
<body>

    <div class="card">
        <h1>مرحباً بك في Pi Auto Market 2026</h1>
        <p>المنصة المعتمدة لتجربة بيع السيارات عبر Pi Testnet.</p>
    </div>

    <!-- نموذج لسيارة من ملفاتك -->
    <div class="card">
        <div class="car-img" style="background-image: url('1000244784_2.jpg');"></div>
        <h3>سيارة العرض الفاخرة</h3>
        <a href="pi://pay?amount=1" class="pi-btn">دفع 1 Pi (تجريبي)</a>
        <div class="sandbox-note">⚠️ هذه عملية دفع تجريبية في Pi Sandbox. لن يتم خصم عملات حقيقية.</div>
    </div>

</body>
</html>
