<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Pi Auto Market 2026</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body>
    <h1>منصة الوسيط الآمن للسيارات</h1>
    <div id="app">
        <p id="status">جاري التهيئة...</p>
        <button id="pay-btn" style="display:none;" onclick="payWithPi()">ادفع 1 Pi</button>
    </div>

    <script>
        // تهيئة الـ SDK
        Pi.init({ 
            version: "2.0", 
            sandbox: true, 
            appID: "m5ssgwfw5lb6yhwcrwir7i6ll5tiv7cpt5uj6utbge" 
        });

        // المصادقة
        Pi.authenticate(['payments'], (user, scopes) => {
            document.getElementById('status').innerText = "أهلاً بك: " + user.username;
            document.getElementById('pay-btn').style.display = "block";
        }, (err) => {
            document.getElementById('status').innerText = "خطأ في المصادقة: " + err;
        });

        async function payWithPi() {
            try {
                const payment = await Pi.createPayment({
                    amount: 1.0,
                    memo: "شراء سيارة - Pi Auto Market 2026",
                    metadata: { orderId: "12345" }
                }, {
                    onReadyForServerCompletion: (id, txid) => alert("نجاح! المعرف: " + txid),
                    onCancel: () => alert("تم الإلغاء"),
                    onError: (err) => alert("خطأ: " + err)
                });
            } catch (err) {
                alert("خطأ في الدفع: " + err);
            }
        }
    </script>
</body>
</html>
