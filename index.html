<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pi Auto Market 2026</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        :root {
            --primary-blue: #0f2027;
            --secondary-blue: #203a43;
            --light-blue: #2c5364;
            --luxury-gold: #d4af37;
            --accent-gold: #f3e5ab;
            --text-light: #ffffff;
            --status-orange: #ff9800;
            --status-green: #4caf50;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(to bottom, var(--primary-blue), var(--secondary-blue), var(--light-blue));
            color: var(--text-light);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        header {
            text-align: center;
            padding: 20px 0;
            border-bottom: 2px solid var(--luxury-gold);
            margin-bottom: 30px;
        }

        header h1 {
            color: var(--luxury-gold);
            margin: 0 0 10px 0;
            font-size: 2rem;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        header p {
            margin: 0;
            color: var(--accent-gold);
            font-size: 1.1rem;
        }

        .status-box {
            background-color: rgba(255, 152, 0, 0.15);
            border: 1px solid var(--status-orange);
            color: var(--accent-gold);
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 25px;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .status-box.connected {
            background-color: rgba(76, 175, 80, 0.15);
            border: 1px solid var(--status-green);
            color: #81c784;
        }

        .showroom {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .car-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .car-card:hover {
            transform: translateY(-5px);
            border-color: var(--luxury-gold);
        }

        .car-card h3 {
            color: var(--luxury-gold);
            margin-top: 0;
            font-size: 1.4rem;
        }

        .price-tag {
            font-size: 1.3rem;
            color: var(--accent-gold);
            margin: 15px 0;
            font-weight: bold;
        }

        .btn-select {
            background: linear-gradient(45deg, var(--luxury-gold), var(--accent-gold));
            color: var(--primary-blue);
            border: none;
            padding: 10px 20px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            transition: opacity 0.2s;
        }

        .btn-select:hover {
            opacity: 0.9;
        }

        .checkout-section {
            background: rgba(15, 32, 39, 0.8);
            border: 2px solid var(--luxury-gold);
            border-radius: 12px;
            padding: 25px;
            max-width: 500px;
            margin: 0 auto;
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
        }

        .checkout-section h2 {
            text-align: center;
            color: var(--luxury-gold);
            margin-top: 0;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: var(--accent-gold);
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid rgba(212, 175, 55, 0.4);
            background: rgba(0,0,0,0.3);
            color: #fff;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
            text-align: center;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--luxury-gold);
        }

        .btn-pay {
            background: linear-gradient(45deg, #f12711, #f5af19);
            color: white;
            border: none;
            padding: 14px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(241, 39, 17, 0.4);
            transition: all 0.3s ease;
        }

        .btn-pay:hover {
            transform: scale(1.02);
            box-shadow: 0 6px 20px rgba(241, 39, 17, 0.6);
        }

        .btn-pay:disabled {
            background: #555 !important;
            box-shadow: none !important;
            cursor: not-allowed;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <header>
        <h1>Pi Auto Market 2026</h1>
        <p>بوابتك الأولى لشراء السيارات الفاخرة باستخدام عملة Pi الرقمية</p>
    </header>

    <div id="statusBox" class="status-box">
        ⚠️ يرجى تصفح الموقع من داخل تطبيق Pi Browser لتفعيل الميزات الرقمية
    </div>

    <div class="showroom">
        <div class="car-card">
            <h3>تويوتا كامري 2026</h3>
            <p>مواصفات خليجية فل كامل - هجينة</p>
            <div class="price-tag">0.25 Pi</div>
            <button class="btn-select" onclick="selectCar('تويوتا كامري 2026', 0.25)">اختيار وتحديد السيارة</button>
        </div>

        <div class="car-card">
            <h3>لكزس ES 2026</h3>
            <p>فخامة مطلقة - محرك توربو رقمي</p>
            <div class="price-tag">0.50 Pi</div>
            <button class="btn-select" onclick="selectCar('لكزس ES 2026', 0.50)">اختيار وتحديد السيارة</button>
        </div>
    </div>

    <div class="checkout-section">
        <h2>تفاصيل طلب الشراء</h2>
        
        <div class="form-group">
            <label>حساب المشتري (Pi Username)</label>
            <input type="text" id="username" placeholder="جاري القراءة تلقائياً من نظام Pi..." readonly>
        </div>

        <div class="form-group">
            <label>المركبة المحددة</label>
            <input type="text" id="selectedCar" placeholder="اضغط على اختيار السيارة بالأعلى" readonly>
        </div>

        <div class="form-group">
            <label>قيمة المعاملة (Pi)</label>
            <input type="text" id="carPrice" placeholder="0.00" readonly>
        </div>

        <button id="payButton" class="btn-pay" onclick="requestPayment()" disabled>
            يرجى تحديد سيارة أولاً لتوقيع المعاملة
        </button>
    </div>

    <script>
        let currentUser = null;
        let selectedCarName = "";
        let selectedCarPrice = 0;

        // تهيئة الـ Pi SDK مع تفعيل الـ sandbox للتجربة والفحص المعتمد
        try {
            Pi.init({ version: "2.0", sandbox: true });
            
            // طلب تسجيل الدخول وقراءة الهوية الرقمية تلقائياً
            Pi.authenticate(['username'], onIncompletePaymentFound)
                .then(function(auth) {
                    currentUser = auth.user.username;
                    document.getElementById('username').value = currentUser;
                    
                    // تغيير الصندوق للون الأخضر عند نجاح الاتصال
                    const statusBox = document.getElementById('statusBox');
                    statusBox.classList.add('connected');
                    statusBox.innerText = `✅ أهلاً بك يا ${currentUser}! تم ربط هويتك بنظام Pi SDK بنجاح.`;
                })
                .catch(function(error) {
                    console.error("خطأ في توثيق الحساب:", error);
                });
        } catch (e) {
            console.error("الموقع يفتح خارج تطبيق Pi Browser الرسمي", e);
        }

        // دالة تحديد السيارة وتعبئة البيانات تلقائياً في الأسفل دون كتابة يدوية
        function selectCar(name, price) {
            selectedCarName = name;
            selectedCarPrice = price;
            
            document.getElementById('selectedCar').value = name;
            document.getElementById('carPrice').value = price + " Pi";
            
            const payButton = document.getElementById('payButton');
            payButton.removeAttribute('disabled');
            payButton.innerText = `دفع ${price} Pi وتوقيع المعاملة`;
        }

        // دالة إرسال المعاملة المالية التجريبية للشبكة
        function requestPayment() {
            if (!currentUser) {
                alert("برجاء الدخول من داخل متصفح Pi Browser أولاً لتتمكن من الدفع.");
                return;
            }

            if (selectedCarPrice <= 0) {
                alert("برجاء اختيار سيارة من المعرض أولاً.");
                return;
            }

            // إنشاء طلب الدفع عبر الـ SDK الرسمي
            Pi.createPayment({
                amount: selectedCarPrice,
                memo: `شراء مركبة: ${selectedCarName} - عبر متجر Pi Auto Market 2026`,
                metadata: { carName: selectedCarName },
            }, {
                onReadyForServerApproval: function(paymentId) {
                    console.log("المعاملة جاهزة للموافقة في السيرفر، رقم العملية:", paymentId);
                    // هنا يتم توجيه المعاملة للسيرفر، في وضع الفحص المبدئي نكتفي بالتأكيد
                },
                onReadyForServerCompletion: function(paymentId, txid) {
                    console.log("تم نقل العملة بنجاح، رقم الحركة الفريد:", txid);
                    alert(`🎉 مبارك يا ${currentUser}! تمت العملية بنجاح وتحولت لـ Verified.`);
                },
                onCancel: function(paymentId) {
                    console.log("قام المستخدم بإلغاء المعاملة:", paymentId);
                },
                onError: function(error, paymentId) {
                    console.error("حدث خطأ غير متوقع أثناء الدفع:", error);
                    alert("فشل توقيع المعاملة، يرجى المحاولة مرة أخرى.");
                }
            });
        }

        // معالجة المدفوعات المعلقة إن وجدت
        function onIncompletePaymentFound(payment) {
            console.log("تم العثور على معاملة سابقة معلقة:", payment);
        }
    </script>
</body>
</html>
