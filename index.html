<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Pi Auto Market 2026</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body>
    <h1>منصة الوسيط الآمن</h1>
    <div id="app">
        <p id="status">جاري المحاولة...</p>
        <button id="pay-btn" style="display:none;" onclick="payWithPi()">ادفع 1 Pi</button>
    </div>

    <script>
        // إعداد التهيئة
        const initPi = () => {
            try {
                Pi.init({ 
                    version: "2.0", 
                    sandbox: true, 
                    appID: "m5ssgwfw5lb6yhwcrwir7i6ll5tiv7cpt5uj6utbge" 
                });
                
                document.getElementById('status').innerText = "تمت التهيئة، جاري المصادقة...";
                
                Pi.authenticate(['payments'], (user, scopes) => {
                    document.getElementById('status').innerText = "مرحباً: " + user.username;
                    document.getElementById('pay-btn').style.display = "block";
                }, (err) => {
                    document.getElementById('status').innerText = "خطأ في المصادقة (تأكد من إعدادات الموقع في بوابة المطورين): " + err;
                });
            } catch (e) {
                document.getElementById('status').innerText = "خطأ في تشغيل SDK: " + e.message;
            }
        };

        // تشغيل التهيئة بعد تأخير لضمان تحميل المكتبة
        window.addEventListener('load', () => setTimeout(initPi, 1500));

        async function payWithPi() {
            try {
                const payment = await Pi.createPayment({
                    amount: 1.0,
                    memo: "شراء سيارة - Pi Auto Market 2026",
                    metadata: { orderId: "12345" }
                }, {
                    onReadyForServerCompletion: (id, txid) => alert("نجاح! المعرف: " + txid),
                    onCancel: () => alert("تم الإلغاء"),
                    onError: (err) => alert("خطأ في الدفع: " + err)
                });
            } catch (err) {
                alert("تعذر طلب الدفع: " + err);
            }
        }
    </script>
</body>
</html>
