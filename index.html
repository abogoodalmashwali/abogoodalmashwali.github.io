<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pi Auto Market 2026</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #061207, #0b210d); color: #ffffff; text-align: center; padding: 20px; margin: 0; }
        .container { max-width: 600px; background: rgba(255,255,255,0.03); padding: 25px; border-radius: 20px; border: 1px solid #2e7d32; margin: 0 auto; }
        h1 { color: #81c784; font-size: 28px; }
        .car-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 25px 0; }
        .car-card { background: rgba(0,0,0,0.4); border-radius: 15px; padding: 10px; border: 1px solid #2e7d32; }
        .car-card img { width: 100%; height: 110px; object-fit: cover; border-radius: 10px; }
        .car-title { font-size: 14px; font-weight: bold; margin-top: 8px; }
        .car-price { color: #81c784; font-weight: bold; }
        .btn-main { background: linear-gradient(135deg, #2e7d32, #1b5e20); color: white; padding: 18px; width: 100%; border-radius: 30px; border: none; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .section-box { background: rgba(0,0,0,0.4); border-radius: 15px; padding: 15px; margin-top: 20px; text-align: right; font-size: 13px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Pi Auto Market 2026</h1>
        <p>بإشراف: أبو جود المشولي</p>
        
        <div class="car-grid">
            <div class="car-card"><img src="lexus-lx.png" alt="Lexus"><div class="car-title">لكزس LX 600</div><div class="car-price">10 Pi</div></div>
            <div class="car-card"><img src="toyota-camry.png" alt="Camry"><div class="car-title">كامري 2024</div><div class="car-price">5 Pi</div></div>
            <div class="car-card"><img src="toyota-hilux.png" alt="Hilux"><div class="car-title">هايلكس</div><div class="car-price">7 Pi</div></div>
            <div class="car-card"><img src="hyundai-elantra.png" alt="Elantra"><div class="car-title">النترا AD</div><div class="car-price">4 Pi</div></div>
        </div>

        <button class="btn-main" onclick="alert('تم تفعيل المعاملة التجريبية!')">إتمام المعاملة التجريبية</button>

        <div class="section-box">
            <div style="color:#81c784; font-weight:bold;">⚖️ إخلاء المسؤولية</div>
            تطبيق تجريبي مخصص للفحص الفني ضمن شبكة Pi Testnet فقط.
        </div>
        <div class="section-box">
            <div style="color:#81c784; font-weight:bold;">🔒 سياسة الخصوصية</div>
            نحن لا نجمع أي بيانات شخصية، وجميع المعاملات تتم عبر نظام Pi SDK الرسمي.
        </div>
    </div>
    <script>
        // تشغيل نظام المصادقة الآمن
        Pi.init({ version: "2.0" });
    </script>
</body>
</html>
