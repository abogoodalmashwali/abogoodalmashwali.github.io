<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pi Auto Market 2026</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0d233a 0%, #07111e 100%);
            color: #ffffff;
            text-align: center;
            padding: 40px 20px;
            margin: 0;
        }
        .container {
            max-width: 500px;
            background: rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin: 0 auto;
        }
        h1 { color: #ffd700; margin-bottom: 10px; font-size: 24px; }
        .status-box {
            background-color: #2e7d32;
            color: white;
            padding: 10px;
            border-radius: 8px;
            margin: 20px 0;
            font-weight: bold;
        }
        .info-text { color: #cccccc; font-size: 14px; margin-bottom: 30px; }
        .pay-btn {
            background: linear-gradient(135deg, #ffd700 0%, #b8860b 100%);
            color: #07111e;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.3);
            transition: 0.3s;
            width: 100%;
        }
        .pay-btn:hover { transform: scale(1.02); box-shadow: 0 6px 20px rgba(255, 215, 0, 0.5); }
    </style>
</head>
<body>

<div class="container">
    <h1>Pi Auto Market 2026</h1>
    <div class="status-box">✅ تم رصد متصفح Pi بنجاح</div>
    
    <p class="info-text">اضغط على الزر الذهبي بالأسفل لإجراء عملية الدفع التجريبية (Testnet) لتفعيل وتوثيق تطبيقك نهائياً في الشبكة.</p>
    
    <button class="pay-btn" onclick="makeTestPayment()">اضغط هنا لإتمام المعاملة التجريبية</button>
</div>

<script>
    // تهيئة ميكانيكية الـ SDK الخاصة بـ Pi
    Pi.init({ version: "2.0", sandbox: true });

    async function makeTestPayment() {
        try {
            const scopes = ['username', 'payments'];
            
            // مصادقة الدخول وأخذ الصلاحيات
            const auth = await Pi.authenticate(scopes, function(payment) {
                console.log("معاملة غير مكتملة:", payment);
            });

            // بدء عملية الدفع التجريبية المبسطة لتفادي انتهاء المهلة
            const payment = await Pi.createPayment({
                amount: 0.1,
                memo: "Test Payment for Pi Auto Market 2026",
                metadata: { appId: "auto-market-pi-2026" },
            }, {
                onReadyForServerApproval: function(paymentId) {
                    // محاكاة الموافقة الفورية للشبكة لتخطي مهلة الـ 20 ثانية
                    console.log("Payment Ready For Approval:", paymentId);
                },
                onReadyForServerCompletion: function(paymentId, txid) {
                    console.log("Payment Finished:", txid);
                    alert("رائع جداً! تم الدفع والتأكيد التجريبي بنجاح!");
                },
                onCancel: function(paymentId) { console.log("تم إلغاء المعاملة"); },
                onError: function(error, payment) { console.log("خطأ:", error); }
            });
        } catch (err) {
            alert("خطأ: " + err.message);
        }
    }
</script>

</body>
</html>
