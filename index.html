<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Pi Auto Market 2026</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body style="text-align: center; font-family: Arial; padding-top: 50px; background-color: #f4f4f9;">
    <div style="background: white; padding: 30px; border-radius: 15px; display: inline-block; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
        <h1>Pi Auto Market 2026</h1>
        <p>بإشراف: أبو جود المشولي</p>
        <p id="status">جاري الاتصال بشبكة Pi...</p>
    </div>

    <script>
        const Pi = window.Pi;
        Pi.init({ version: "2.0", sandbox: false });

        async function login() {
            try {
                const auth = await Pi.authenticate(['username'], function(p) {});
                document.getElementById('status').innerText = "تم تسجيل الدخول بنجاح: " + auth.user.username;
                document.getElementById('status').style.color = "green";
            } catch (err) {
                document.getElementById('status').innerText = "يرجى فتح التطبيق من داخل Pi Browser";
                document.getElementById('status').style.color = "red";
            }
        }
        
        window.onload = function() {
            login();
        };
    </script>
</body>
</html>
